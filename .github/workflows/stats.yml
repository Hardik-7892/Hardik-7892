name: Generate GitHub Text Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate stats
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const fs = require('fs');
            console.log("🚀 Script started");
            const query = `
              query($login: String!) {
                user(login: $login) {
                  login
                  name
                  contributionsCollection {
                    totalCommitContributions
                    restrictedContributionsCount
                    totalPullRequestContributions
                    totalPullRequestReviewContributions
                  }
                  repositoriesContributedTo(includeUserRepositories: true) {
                    totalCount
                  }
                }
              }
            `;
            console.log("📡 Running GraphQL...");
            const result = await github.graphql(query, {
              login: context.repo.owner
            });
            console.log("✅ RAW RESULT:");
            console.log(JSON.stringify(result, null, 2));
        
            if (!result || !result.user) {
              throw new Error("User data is missing from GraphQL response");
            }
            
            const u = result.user;

            const output = `# 📊 GitHub Text Stats

            👤 User: ${u.name || u.login}
            
            ## Contributions
            - Commits: ${u.contributionsCollection.totalCommitContributions}
            - Private contributions: ${u.contributionsCollection.restrictedContributionsCount}
            - Pull Requests: ${u.contributionsCollection.totalPullRequestContributions}
            - Reviews: ${u.contributionsCollection.totalPullRequestReviewContributions}
            
            ## Repository Activity
            - Repositories contributed to: ${u.repositoriesContributedTo.totalCount}
            
            _Last updated: ${new Date().toUTCString()}_
            `;
            console.log("📝 Writing file...");
            fs.writeFileSync("stats.md", output);
            console.log("✅ File written");

      - name: Commit stats
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add stats.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "update stats"

          git push
